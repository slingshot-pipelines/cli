name: on-push

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed-component-types: ${{ steps.components-changed.outputs.changed-component-types }}
      changed-components-by-type: ${{ steps.components-changed.outputs.changed-components-by-type }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Detect changed components
        id: components-changed
        uses: slingshot-pipelines/action-components-changed@v1

  release-library:
    needs: detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"library"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/release-library.yml@release-library/v1
    strategy:
      matrix:
        COMPONENT: ${{ fromJSON(needs.detect-changes.outputs.changed-components-by-type).library }}
    with:
      COMPONENT: ${{ matrix.COMPONENT }}
    secrets: inherit
